<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Notifications</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 1.4rem; font-weight: 600; }

    #status {
      font-size: 0.8rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: #d1fae5;
      color: #065f46;
    }
    #status.error { background: #fee2e2; color: #991b1b; }

    #meta {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    thead { background: #1e293b; color: #fff; }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.875rem;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr.data-row { cursor: pointer; }
    tbody tr.data-row:hover td { background: #f1f5f9; }

    tbody tr.payload-row td {
      padding: 0;
      background: #0f172a;
    }

    tbody tr.payload-row.hidden { display: none; }

    pre.payload {
      margin: 0;
      padding: 1rem 1.25rem;
      font-size: 0.8rem;
      color: #7dd3fc;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }

    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      color: #6366f1;
      background: none;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      cursor: pointer;
    }
    .toggle-btn:hover { background: #eef2ff; }

    #empty {
      text-align: center;
      padding: 3rem;
      color: #888;
      font-size: 0.9rem;
    }

    .interval-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #555;
    }

    .interval-control input {
      width: 60px;
      padding: 0.2rem 0.4rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Payment Notifications</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="interval-control">
        Poll every
        <input type="number" id="interval" min="1" max="60" value="5" />
        s
      </div>
      <span id="status">Live</span>
    </div>
  </header>

  <p id="meta">Waiting for first poll…</p>

  <table id="table">
    <thead>
      <tr>
        <th>#</th>
        <th>Reference Number</th>
        <th>Transaction Date/Time</th>
        <th>Received At</th>
        <th>Payload</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="5" id="empty">No notifications yet.</td></tr>
    </tbody>
  </table>

  <script>
    const statusEl   = document.getElementById('status');
    const metaEl     = document.getElementById('meta');
    const tbodyEl    = document.getElementById('tbody');
    const intervalEl = document.getElementById('interval');

    let pollTimer = null;

    function formatDate(iso) {
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function prettyJson(obj) {
      try { return JSON.stringify(obj, null, 2); } catch { return String(obj); }
    }

    function buildRows(items, count) {
      return [...items].reverse().flatMap((n, i) => {
        const rowId = `payload-${count - i}`;
        return [
          `<tr class="data-row" onclick="togglePayload('${rowId}')">
            <td>${count - i}</td>
            <td>${escHtml(n.reference_number)}</td>
            <td>${escHtml(n.transaction_date_time)}</td>
            <td>${formatDate(n.received_at)}</td>
            <td><button class="toggle-btn" onclick="event.stopPropagation();togglePayload('${rowId}')">&#123;&#125; View</button></td>
          </tr>`,
          `<tr id="${rowId}" class="payload-row hidden">
            <td colspan="5"><pre class="payload">${escHtml(prettyJson(n.raw_payload))}</pre></td>
          </tr>`
        ];
      }).join('');
    }

    function togglePayload(id) {
      const row = document.getElementById(id);
      if (row) row.classList.toggle('hidden');
    }

    async function poll() {
      try {
        const res = await fetch('/ws/payment/notifications');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { count, items } = await res.json();

        statusEl.textContent = 'Live';
        statusEl.className = '';
        metaEl.textContent = `${count} notification(s) — last updated ${new Date().toLocaleTimeString()}`;

        if (count === 0) {
          tbodyEl.innerHTML = '<tr><td colspan="5" id="empty">No notifications yet.</td></tr>';
          return;
        }

        // Preserve which payloads are open before re-render
        const openIds = new Set(
          [...document.querySelectorAll('.payload-row:not(.hidden)')].map(r => r.id)
        );

        tbodyEl.innerHTML = buildRows(items, count);

        openIds.forEach(id => {
          const row = document.getElementById(id);
          if (row) row.classList.remove('hidden');
        });
      } catch (err) {
        statusEl.textContent = 'Error';
        statusEl.className = 'error';
        metaEl.textContent = `Poll failed: ${err.message}`;
      }
    }

    function startPolling() {
      clearInterval(pollTimer);
      const seconds = Math.max(1, parseInt(intervalEl.value, 10) || 5);
      poll();
      pollTimer = setInterval(poll, seconds * 1000);
    }

    intervalEl.addEventListener('change', startPolling);
    startPolling();
  </script>
</body>
</html>
